<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#e9e2d6"/>
      <stop offset="35%" stop-color="#cfc7bd"/>
      <stop offset="60%" stop-color="#9fa6a5"/>
      <stop offset="100%" stop-color="#5f7275"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5b6f72"/>
      <stop offset="45%"  stop-color="#33474b"/>
      <stop offset="100%" stop-color="#16262b"/>
    </linearGradient>
    <radialGradient id="sun" cx="72%" cy="20%" r="45%">
      <stop offset="0%"  stop-color="#fff6e8" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#f0e6d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f0e6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softer" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- небо -->
  <rect x="0" y="0" width="1600" height="640" fill="url(#sky)"/>
  <rect x="0" y="0" width="1600" height="640" fill="url(#sun)"/>

  <!-- дальние горы (атмосферная перспектива) -->
  <path d="M0,470 L220,360 L430,440 L640,340 L900,470 L1180,360 L1600,460 L1600,640 L0,640 Z"
        fill="#8b9599" opacity="0.35" filter="url(#soft)"/>
  <path d="M0,520 L260,430 L520,510 L820,410 L1120,520 L1420,440 L1600,520 L1600,640 L0,640 Z"
        fill="#6f7c80" opacity="0.45" filter="url(#soft)"/>

  <!-- полоса тумана над водой -->
  <rect x="0" y="560" width="1600" height="150" fill="#d9d3c8" opacity="0.30" filter="url(#softer)"/>

  <!-- море -->
  <rect x="0" y="620" width="1600" height="380" fill="url(#sea)"/>

  <!-- блик на воде -->
  <ellipse cx="1150" cy="700" rx="520" ry="46" fill="#e9ddc7" opacity="0.16" filter="url(#softer)"/>

  <!-- лёгкие волны -->
  <path d="M0,860 C300,830 500,900 800,865 C1100,830 1350,905 1600,865 L1600,1000 L0,1000 Z"
        fill="#12232a" opacity="0.55"/>
  <path d="M0,930 C280,905 560,965 860,930 C1160,900 1380,960 1600,930 L1600,1000 L0,1000 Z"
        fill="#0d1a20" opacity="0.7"/>

  <!-- скала слева (как на референсе) -->
  <path d="M0,300 L150,300 L175,360 L150,520 L120,700 L0,780 Z" fill="#2b2b2c" opacity="0.9"/>
  <rect x="0" y="300" width="150" height="40" fill="#3a3a3b" opacity="0.8"/>
</svg>
